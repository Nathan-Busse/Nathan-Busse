<svg width="100%" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#1e1e2f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad)"/>
  <rect x="50" y="40" width="700" height="120" rx="16" fill="none" stroke="#2bbc8a" stroke-width="2" stroke-opacity="0.4"/>
  <text x="400" y="100" font-family="Fira Code, Consolas, monospace" font-size="36" font-weight="bold" fill="#2bbc8a" text-anchor="middle" filter="url(#glow)">NATHAN BUSSE</text>
  <text x="400" y="140" font-family="Fira Code, Consolas, monospace" font-size="18" fill="#e0e0e0" text-anchor="middle" opacity="0.8">Turning the Impossible Possible</text>
  <text x="400" y="175" font-family="Fira Code, Consolas, monospace" font-size="12" fill="#aaaaaa" text-anchor="middle">Self-Taught Programmer | Future Engineer</text>
  <line x1="60" y1="40" x2="100" y1="40" stroke="#2bbc8a" stroke-width="2"/>
  <line x1="60" y1="40" x2="60" y1="80" stroke="#2bbc8a" stroke-width="2"/>
  <line x1="740" y1="160" x2="700" y1="160" stroke="#2bbc8a" stroke-width="2"/>
  <line x1="740" y1="160" x2="740" y1="120" stroke="#2bbc8a" stroke-width="2"/>
</svg>
