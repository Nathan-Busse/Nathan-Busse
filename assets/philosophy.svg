<svg width="650" height="100" viewBox="0 0 650 100" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="100%" height="100%" rx="10" fill="#111" stroke="#2bbc8a" stroke-width="1"/>
  <text x="275" y="40" font-family="sans-serif" font-size="16" fill="#2bbc8a" text-anchor="middle" font-weight="bold">"Born premature, blind in one eye, -14 in the other. But I see clearer than most."</text>
  <text x="275" y="70" font-family="sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">I don’t use the word "can’t". I turn limitations into superpowers.</text>
</svg>
