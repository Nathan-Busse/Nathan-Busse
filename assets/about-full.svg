<svg width="100%" height="880" viewBox="0 0 800 880" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2bbc8a"/>
      <stop offset="100%" stop-color="#1a8a6a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151520"/>
      <stop offset="100%" stop-color="#0f0f18"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bbc8a"/>
      <stop offset="100%" stop-color="#00a86b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="880" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="440" x2="800" y2="440" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="800" y2="480" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="520" x2="800" y2="520" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="560" x2="800" y2="560" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="800" y2="600" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="640" x2="800" y2="640" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="680" x2="800" y2="680" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="720" x2="800" y2="720" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="760" x2="800" y2="760" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="800" x2="800" y2="800" stroke="#2bbc8a" stroke-width="0.5"/>
    <line x1="0" y1="840" x2="800" y2="840" stroke="#2bbc8a" stroke-width="0.5"/>
  </g>

  <!-- Top decorative line -->
  <line x1="30" y1="20" x2="770" y2="20" stroke="url(#accentGrad)" stroke-width="1" opacity="0.6"/>
  <circle cx="30" cy="20" r="3" fill="#2bbc8a" opacity="0.8"/>
  <circle cx="770" cy="20" r="3" fill="#2bbc8a" opacity="0.8"/>

  <!-- ==================== SECTION 1: ABOUT ME ==================== -->
  <text x="400" y="55" font-family="'Fira Code', 'Consolas', monospace" font-size="26" font-weight="bold" fill="#2bbc8a" text-anchor="middle" filter="url(#glow)">🚀 About Me: Turning the Impossible Possible</text>

  <text x="40" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#d0d0d0">
    <tspan x="40" dy="0">Since a young age, I've been captivated by </tspan>
    <tspan fill="#2bbc8a" font-weight="bold">technology</tspan>
    <tspan>, especially </tspan>
    <tspan fill="#2bbc8a" font-weight="bold">software, robotics, Artificial Intelligence, and space exploration</tspan>
  </text>
  <text x="40" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#d0d0d0">
    <tspan x="40" dy="0">My journey in programming began in </tspan>
    <tspan fill="#2bbc8a" font-weight="bold">2014</tspan>
    <tspan> at the age of 11 with my </tspan>
    <tspan fill="#2bbc8a" font-weight="bold">Raspberry Pi Model B+</tspan>
    <tspan>.</tspan>
  </text>

  <text x="40" y="162" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#d0d0d0">
    <tspan x="40" dy="0">I am a self-taught programmer, student, and self-proclaimed "Nerd" who is addicted to code. I see myself</tspan>
    <tspan x="40" dy="22">as my own role model because everything I know—from hardware to programming—I taught myself.</tspan>
    <tspan x="40" dy="22">I want to use this gift to </tspan>
    <tspan fill="#2bbc8a" font-weight="bold">change the world, one line of code at a time.</tspan>
  </text>

  <!-- Section divider -->
  <line x1="40" y1="230" x2="760" y2="230" stroke="#2bbc8a" stroke-width="0.5" opacity="0.2"/>
  <circle cx="400" cy="230" r="3" fill="#2bbc8a" opacity="0.4"/>

  <!-- ==================== SECTION 2: PROGRAMMING JOURNEY ==================== -->
  <text x="400" y="265" font-family="'Fira Code', 'Consolas', monospace" font-size="22" font-weight="bold" fill="#2bbc8a" text-anchor="middle" filter="url(#glow)">💻 My Programming Journey</text>

  <text x="40" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#d0d0d0">
    <tspan x="40" dy="0">I am currently a student, and when I'm not doing schoolwork, I'm at my computer, bringing crazy projects</tspan>
    <tspan x="40" dy="22">I dreamt of the night before to life. I don't just love programming—</tspan>
    <tspan fill="#2bbc8a" font-weight="bold">I dream in it.</tspan>
  </text>

  <text x="40" y="350" font-family="'Fira Code', 'Consolas', monospace" font-size="16" font-weight="bold" fill="#2bbc8a">Why I Love Programming</text>

  <text x="40" y="378" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#d0d0d0">
    <tspan x="40" dy="0">Programming is a world of </tspan>
    <tspan fill="#2bbc8a" font-weight="bold">imagination and creativity</tspan>
    <tspan>—the Marvel Universe of the modern world. I love the process</tspan>
    <tspan x="40" dy="22">of learning and seeing my creations come to life.</tspan>
  </text>

  <text x="40" y="418" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#d0d0d0">
    <tspan x="40" dy="0">More than just entertainment, programming is used to </tspan>
    <tspan fill="#2bbc8a" font-weight="bold">save lives</tspan>
    <tspan>:</tspan>
  </text>

  <circle cx="55" cy="445" r="3" fill="#2bbc8a" opacity="0.7"/>
  <text x="70" y="449" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#d0d0d0">
    <tspan fill="#2bbc8a">Algorithms</tspan> that predict and prevent crime.
  </text>

  <circle cx="55" cy="470" r="3" fill="#2bbc8a" opacity="0.7"/>
  <text x="70" y="474" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#d0d0d0">
    <tspan fill="#2bbc8a">Bomb disposal robots</tspan> that protect hundreds of lives.
  </text>

  <circle cx="55" cy="495" r="3" fill="#2bbc8a" opacity="0.7"/>
  <text x="70" y="499" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#d0d0d0">
    <tspan fill="#2bbc8a">Software</tspan> used in medicine to discover new diseases and develop cures.
  </text>

  <text x="40" y="530" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#d0d0d0">
    <tspan x="40" dy="0">I also love the community aspect of </tspan>
    <tspan fill="#2bbc8a" font-weight="bold">GitHub</tspan>
    <tspan>, which connects millions of programmers, allowing us to share</tspan>
    <tspan x="40" dy="22">ideas, collaborate, and learn new things every day.</tspan>
  </text>

  <text x="40" y="575" font-family="'Fira Code', 'Consolas', monospace" font-size="16" font-weight="bold" fill="#2bbc8a">First Encounters</text>

  <circle cx="55" cy="600" r="3" fill="#2bbc8a" opacity="0.7"/>
  <text x="70" y="604" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#d0d0d0">
    My first official language was <tspan fill="#2bbc8a" font-weight="bold">C++</tspan>.
  </text>

  <circle cx="55" cy="625" r="3" fill="#2bbc8a" opacity="0.7"/>
  <text x="70" y="629" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#d0d0d0">
    My first project was the <tspan fill="#2bbc8a" font-weight="bold">MeArm robot</tspan> operated by an Arduino Uno.
  </text>

  <!-- Section divider -->
  <line x1="40" y1="660" x2="760" y2="660" stroke="#2bbc8a" stroke-width="0.5" opacity="0.2"/>
  <circle cx="400" cy="660" r="3" fill="#2bbc8a" opacity="0.4"/>

  <!-- ==================== SECTION 3: TECHNOLOGIES & TOOLS ==================== -->
  <text x="400" y="695" font-family="'Fira Code', 'Consolas', monospace" font-size="22" font-weight="bold" fill="#2bbc8a" text-anchor="middle" filter="url(#glow)">🔧 Technologies &amp; Tools</text>

  <!-- Hex Grid - Row 1 -->
  <polygon points="100,720 115,730 100,740 85,730" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="100" y="734" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Python</text>

  <polygon points="180,720 195,730 180,740 165,730" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="180" y="734" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">C++</text>

  <polygon points="260,720 275,730 260,740 245,730" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="260" y="734" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">JavaScript</text>

  <polygon points="340,720 355,730 340,740 325,730" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="340" y="734" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">HTML5</text>

  <polygon points="420,720 435,730 420,740 405,730" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="420" y="734" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Bash</text>

  <polygon points="500,720 515,730 500,740 485,730" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="500" y="734" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Linux</text>

  <polygon points="580,720 595,730 580,740 565,730" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="580" y="734" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Windows</text>

  <polygon points="660,720 675,730 660,740 645,730" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="660" y="734" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Arduino</text>

  <!-- Hex Grid - Row 2 -->
  <polygon points="140,760 155,770 140,780 125,770" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="140" y="774" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Raspberry Pi</text>

  <polygon points="220,760 235,770 220,780 205,770" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="220" y="774" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">PyCharm</text>

  <polygon points="300,760 315,770 300,780 285,770" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="300" y="774" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">GIT</text>

  <polygon points="380,760 395,770 380,780 365,770" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="380" y="774" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Docker</text>

  <polygon points="460,760 475,770 460,780 445,770" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="460" y="774" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">FIGMA</text>

  <polygon points="540,760 555,770 540,780 525,770" fill="none" stroke="url(#hex)" stroke-width="2"/>
  <text x="540" y="774" font-family="sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">VS Code</text>

  <!-- ==================== SECTION 4: MOTTO ==================== -->
  <rect x="30" y="800" width="740" height="65" rx="12" fill="url(#cardGrad)" stroke="#2bbc8a" stroke-width="1" stroke-opacity="0.3"/>

  <text x="60" y="825" font-family="Georgia, serif" font-size="28" fill="#2bbc8a" opacity="0.3">"</text>
  <text x="710" y="855" font-family="Georgia, serif" font-size="28" fill="#2bbc8a" opacity="0.3">"</text>

  <text x="230" y="828" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#2bbc8a" filter="url(#glow)">
    "Make the impossible possible"
  </text>
  <text x="400" y="848" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0" text-anchor="middle">
    and
  </text>
  <text x="570" y="828" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#2bbc8a">
    "Wish it, dream it, do it."
  </text>

  <!-- Bottom decorative line -->
  <line x1="30" y1="875" x2="770" y2="875" stroke="url(#accentGrad)" stroke-width="1" opacity="0.4"/>
  <circle cx="400" cy="875" r="2" fill="#2bbc8a" opacity="0.6"/>

  <path d="M30 870 L30 875 L35 875" fill="none" stroke="#2bbc8a" stroke-width="1.5" opacity="0.4"/>
  <path d="M770 870 L770 875 L765 875" fill="none" stroke="#2bbc8a" stroke-width="1.5" opacity="0.4"/>
</svg>
