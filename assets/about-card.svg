<svg width="200" height="140" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAbout" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bbc8a"/>
      <stop offset="100%" stop-color="#00a86b"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="180" height="120" rx="8" fill="none" stroke="url(#gradAbout)" stroke-width="2"/>
  <text x="100" y="40" font-family="sans-serif" font-size="16" fill="#2bbc8a" text-anchor="middle" font-weight="bold">About Me</text>
  <text x="100" y="65" font-family="sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">At 11, a Raspberry Pi sparked my</text>
  <text x="100" y="85" font-family="sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">journey. Visually impaired, but I </text>
  <text x="100" y="105" font-family="sans-serif" font-size="11" fill="#e0e0e0" text-anchor="middle">never say "I can't".</text>
  <text x="100" y="125" font-family="sans-serif" font-size="9" fill="#2bbc8a" text-anchor="middle" font-style="italic">Make the impossible possible.</text>
</svg>
